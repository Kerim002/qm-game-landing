<!doctype html>
<html lang="en">

<head>
	<meta charset="utf-8" />
	<link rel="icon" href="%sveltekit.assets%/favicon.png" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<meta name="description"
		content="Quiz Masters — Real Time PVP Trivia Battles. More than just trivia. It's tactical." />
	<title>Quiz Masters</title>
	<link rel="preconnect" href="https://fonts.googleapis.com" />
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous" />
	<link
		href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800;900&display=swap"
		rel="stylesheet" />
	<meta name="google-site-verification" content="h6Aam-QY-hQiexphLguJx05lEbfXtEAtmUXX0sUEMJY" />
	<link rel="canonical" href={url} />

	<meta property="og:image" content="https://quizmasters.beaconarc.xyz/images/pvp.jpg" />
	<meta property="og:image:secure_url" content="https://quizmasters.beaconarc.xyz/images/pvp.jpg" />
	<meta property="og:image:type" content="image/jpg" />
	
	<meta property="og:image:width" content="1200" />
	<meta property="og:image:height" content="630" />

	<meta property="twitter:card" content="summary_large_image" />
	<meta property="twitter:url" content={url} />
	<meta property="twitter:title" content={title} />
	<meta property="twitter:description" content={description} />
	<meta property="twitter:image" content="https://quizmasters.beaconarc.xyz/images/pvp.jpg" />
	%sveltekit.head%
</head>

<body data-sveltekit-preload-data="hover">
	<div style="display: contents">%sveltekit.body%</div>
</body>

</html>
