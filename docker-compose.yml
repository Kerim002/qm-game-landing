services:
  sveltekit-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sveltekit_prod
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      # CRITICAL: SvelteKit forms protect against CSRF attacks. 
      # You MUST supply the external URL production origin here.
      # - ORIGIN=https://yourdomain.com